# Railway deployment configuration for backend-core (Express ESM)
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend-core/Dockerfile"
# Build context is the backend-core directory
dockerContextPath = "backend-core"

[deploy]
startCommand = "node src/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
